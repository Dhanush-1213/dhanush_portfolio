<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Prevent white flash -->
    <style>
      html, body {
        background-color: #0a0a0a;
      }
    </style>

    <!-- SEO -->
    <meta name="description" content="Dhanush | AI & ML Developer Portfolio" />
    <meta name="author" content="Dhanush" />
    <meta name="keywords" content="Dhanush, AI Developer, ML Portfolio, Frontend Developer, React, Vite" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="color-scheme" content="dark light" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="Dhanush | AI & ML Developer Portfolio" />
    <meta property="og:description" content="Explore Dhanush's AI & ML projects and creative portfolio." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:url" content="https://yourwebsite.com" />
    <meta property="og:type" content="website" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Dhanush | AI & ML Developer Portfolio" />
    <meta name="twitter:description" content="Explore Dhanush's AI & ML projects and creative portfolio." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Font Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Poppins:wght@300;400;600;700&family=Fira+Code:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- Devicons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/devicons/devicon@2.15.1/devicon.min.css"
    />

    <title>Dhanush K</title>

    <!-- Global Styles -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow-x: hidden;
        background-color: #0a0a0a;
        font-family: "Poppins", system-ui, -apple-system, BlinkMacSystemFont,
          sans-serif;
      }

      #root {
        min-height: 100vh;
        background-color: #0a0a0a;
      }
    </style>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
  </head>

  <body>

    <!-- React App -->
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

  </body>
</html>
